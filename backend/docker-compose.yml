version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: poker_db_container
    environment:
      POSTGRES_DB: ${DB_NAME:-poker_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: poker_redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: poker_server_container
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-poker_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - SPRING_PROFILES_ACTIVE=prod

volumes:
  db_data: