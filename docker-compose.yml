version: '3.8'

services:
  # Наш фронтенд на Python
  frontend:
    build: ../frontend  # путь к папке фронта
    ports:
      - "8000:8000"
    volumes:
      - ../frontend:/app
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/casino

  # Твой будущий бэк на Java
  backend:
    build: ../backend
    ports:
      - "8080:8080"
    depends_on:
      - db

  # База данных для казино
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: casino
    ports:
      - "5432:5432"
