version: '3.8'

services:
  # База данных

  db:
    image: postgres:15
    container_name: poker_db
    environment:
      POSTGRES_DB: poker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass # Пароль должен совпадать с тем, что в бэкенде
    ports:
      - "5432:5432"

  backend:
    build: ../backend
    container_name: poker_backend
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/poker_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=pass
      - REDIS_HOST=redis

  # Бэкенд на Java
  backend:
    build: ../backend
    container_name: poker_backend
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=user
      - DB_PASSWORD=pass
      - DB_NAME=casino
      - REDIS_HOST=redis

  # Фронтенд на Python
  frontend:
    build: ../frontend
    container_name: poker_frontend
    ports:
      - "8000:8000"
    volumes:
      - ../frontend:/app
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/casino
