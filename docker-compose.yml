version: '3.8'

services:
  # База данных
  db:
    image: postgres:15
    container_name: poker_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: casino
    ports:
      - "5432:5432"

  # Кэш Redis (обязательно для бэкенда!)
  redis:
    image: redis:7-alpine
    container_name: poker_redis
    ports:
      - "6379:6379"

  # Бэкенд на Java
  backend:
    build: ../backend
    container_name: poker_backend
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=user
      - DB_PASSWORD=pass
      - DB_NAME=casino
      - REDIS_HOST=redis

  # Фронтенд на Python
  frontend:
    build: ../frontend
    container_name: poker_frontend
    ports:
      - "8000:8000"
    volumes:
      - ../frontend:/app
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/casino
