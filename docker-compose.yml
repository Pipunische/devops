services:
  db:
    image: postgres:15
    container_name: poker_db
    environment:
      - POSTGRES_DB=poker_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pass
    ports:
      - "5432:5432"
    networks:
      - casino_net
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: poker_redis
    ports:
      - "6379:6379"
    networks:
      - casino_net

  backend:
    build: ../backend
    container_name: poker_backend
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/poker_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=pass
      - REDIS_HOST=redis
      - SPRING_MAIN_ALLOW_CIRCULAR_REFERENCES=true
    networks:
      - casino_net

  frontend:
    build: ../frontend
    container_name: poker_frontend
    depends_on:
      - backend
    ports:
      - "8000:8000"
    volumes:
      - ../frontend:/app
    networks:
      - casino_net

networks:
  casino_net:
    driver: bridge