<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Poker Club</title>
    <style>
        /* Те же стили, что и в login.html (потом вынесем в отдельный файл для DRY) */
        body {
            background: radial-gradient(circle, #1a2a3a 0%, #0d141b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            color: white;
            margin: 0;
        }
        .auth-box {
            background: #222; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid #3498db; /* Синий цвет для реги, чтобы отличать от логина */
            text-align: center; width: 300px;
        }
        .auth-box h2 { margin-top: 0; color: #3498db; text-transform: uppercase; letter-spacing: 2px; }
        .auth-form { display: flex; flex-direction: column; gap: 20px; }
        .input-field {
            padding: 15px; background: #333; border: 1px solid #555;
            color: white; border-radius: 8px; font-size: 16px; outline: none;
        }
        .input-field:focus { border-color: #3498db; }
        .submit-btn {
            background-color: #3498db; color: #fff; font-weight: bold;
            font-size: 18px; padding: 15px; border: none; border-radius: 8px;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .submit-btn:hover { background-color: #2980b9; transform: scale(1.05); }
        .back-link { margin-top: 20px; display: block; color: #bdc3c7; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #3498db; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h2>Регистрация</h2>

        {# МАГИЯ JINJA: Если Питон прислал ошибку - показываем её! #}
    {% if error %}
        <div style="background: rgba(231, 76, 60, 0.2); color: #e74c3c; padding: 10px; border: 1px solid #e74c3c; border-radius: 8px; margin-bottom: 20px; font-size: 14px;">
            ⚠️ {{ error }}
        </div>
    {% endif %}
        
        <form class="auth-form" action="/register" method="POST">
            <!-- Новое поле: Игровой Никнейм -->
            <input type="text" name="nickname" class="input-field" placeholder="Игровой никнейм" required>
            
            <input type="text" name="login" class="input-field" placeholder="Придумайте логин" required>
            <input type="password" name="password" class="input-field" placeholder="Пароль" required>
            
            <button type="submit" class="submit-btn">Создать аккаунт</button>
        </form>

        <a href="/login" class="back-link">Уже есть аккаунт? Войти</a>
    </div>

</body>
</html>
