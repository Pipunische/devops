<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Poker Club</title>
    <style>
        /* Базовый стиль в духе нашего стола */
        body {
            background: radial-gradient(circle, #1a2a3a 0%, #0d141b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            color: white;
            margin: 0;
        }

        .login-box {
            background: #222;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid #f1c40f;
            text-align: center;
            width: 300px;
        }

        .login-box h2 {
            margin-top: 0;
            color: #f1c40f;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Стиль формы */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-field {
            padding: 15px;
            background: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .input-field:focus {
            border-color: #2ecc71;
        }

        .submit-btn {
            background-color: #2ecc71;
            color: #1a1a1a;
            font-weight: bold;
            font-size: 18px;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }

        .register-link {
            margin-top: 20px;
            display: block;
            color: #bdc3c7;
            text-decoration: none;
            font-size: 14px;
        }
        .register-link:hover { color: #f1c40f; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Вход в клуб</h2>
        
        <!-- ВАЖНО: action="/login" указывает, куда уйдут данные. 
             method="POST" - скрывает пароль от адресной строки! -->
        <form class="login-form" action="/login" method="POST">

            {% if error %}
                <div style="background: #e74c3c; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
                    {{ error }}
                </div>
            {% endif %}

            <!-- name="login" - это ключ, по которому Питон найдет логин -->
            <input type="text" name="login" class="input-field" placeholder="Ваш логин" required>
            
            <!-- type="password" превращает текст в точечки. name="password" - ключ для Питона -->
            <input type="password" name="password" class="input-field" placeholder="Пароль" required>
            
            <button type="submit" class="submit-btn">Войти за стол</button>
        </form>

        <a href="/register" class="register-link">Нет аккаунта? Создать!</a>
    </div>

</body>
</html>
